# ═══════════════════════════════════════════════════════════════════════
# configs/student.yaml — Student model training configuration
# ═══════════════════════════════════════════════════════════════════════

model_id: "answerdotai/ModernBERT-base"

# ── Tokenization ──────────────────────────────────────────────────────
max_length: 512           # ModernBERT supports up to 8192

# ── Training hyperparameters ──────────────────────────────────────────
num_epochs: 5
batch_size: 16
learning_rate: 2.0e-5
weight_decay: 0.01
warmup_ratio: 0.1
max_grad_norm: 1.0
gradient_accumulation_steps: 1

# ── Evaluation ────────────────────────────────────────────────────────
monitor_metric: "f1"
early_stopping_patience: 3

# ── DataLoader ────────────────────────────────────────────────────────
num_workers: 0            # Set > 0 if multiprocess loading is needed

# ── Output ────────────────────────────────────────────────────────────
experiments_dir: "experiments"
checkpoints_dir: "checkpoints"
